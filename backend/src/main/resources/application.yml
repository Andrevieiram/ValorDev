spring:
  application:
    name: valordev-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/valordev
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

valordev:
  security:
    jwt:
      secret: ${JWT_SECRET:super-secret-key-that-must-be-at-least-256-bits-long-for-hs256-algorithm}
      expiration-ms: 86400000 # 24 horas
